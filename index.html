<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>1 Year With Georgia ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #fff5f9);
  text-align: center;
  color: #333;
}

header {
  padding: 80px 20px;
}

h1 {
  font-size: 3em;
  color: #e91e63;
}

.countdown {
  font-size: 2.5em;
  font-weight: bold;
  margin-top: 20px;
  letter-spacing: 2px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<header>
  <h1>1 Year With You ❤️</h1>
  <div id="countdown" class="countdown"></div>
</header>

<script>
const anniversaryDate = new Date("March 29, 2026 00:00:00").getTime();
const countdownElement = document.getElementById("countdown");

function updateCountdown() {
  const now = new Date().getTime();
  const distance = anniversaryDate - now;

  if (distance <= 0) {
    countdownElement.innerHTML = "❤️ Happy Anniversary My Love ❤️";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  countdownElement.innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
