<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Year With You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #fff5f9);
  text-align: center;
  color: #333;
}

header {
  padding: 80px 20px 40px 20px;
}

h1 {
  font-size: 3em;
  color: #e91e63;
  margin-bottom: 10px;
}

.countdown {
  font-size: 2.5em;
  font-weight: bold;
  letter-spacing: 2px;
  animation: pulse 1.5s infinite;
}

#revealText {
  margin-top: 40px;
  font-size: 1.3em;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  opacity: 0;
  transition: opacity 1s ease;
  line-height: 1.6;
}

footer {
  margin-top: 80px;
  padding: 20px;
  font-size: 0.9em;
  opacity: 0.6;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

@media (max-width: 600px) {
  h1 { font-size: 2em; }
  .countdown { font-size: 1.8em; }
  #revealText { font-size: 1.1em; padding: 0 20px; }
}
</style>
</head>

<body>

<header>
  <h1>1 Year With You ❤️</h1>
  <div id="countdown" class="countdown"></div>
</header>

<div id="revealText"></div>

<footer>
  Built with love by Tibebu ❤️
</footer>

<script>
const anniversaryDate = new Date("March 29, 2026 00:00:00").getTime();
const countdownElement = document.getElementById("countdown");
const revealElement = document.getElementById("revealText");

function updateCountdown() {
  const now = new Date().getTime();
  const distance = anniversaryDate - now;

  if (distance <= 0) {
    countdownElement.innerHTML = "❤️ Happy 1 Year Anniversary My Love ❤️";
    revealElement.innerHTML = "Today we celebrate us. One year of memories, laughter, growth, and love. And I would choose you all over again.";
    revealElement.style.opacity = 1;
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  countdownElement.innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s";

  let message = "";

  if (days <= 1) {
    message = "Tomorrow we celebrate 1 year of choosing each other. And I still get excited about you.";
  } 
  else if (days <= 5) {
    message = "Five days left… and I’m thinking about every laugh, every drive, every quiet moment we’ve shared.";
  } 
  else if (days <= 10) {
    message = "Ten days until we celebrate one year. One year of growing together.";
  } 
  else if (days <= 20) {
    message = "Less than three weeks until our anniversary. And I still look at you like it’s the beginning.";
  } 
  else if (days <= 30) {
    message = "The countdown has begun. Something special is coming.";
  } 
  else {
    message = "";
  }

  if (message !== revealElement.innerHTML) {
    revealElement.style.opacity = 0;
    setTimeout(() => {
      revealElement.innerHTML = message;
      revealElement.style.opacity = message ? 1 : 0;
    }, 500);
  }
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
